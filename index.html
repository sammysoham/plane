<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zen Environment Test</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #cesiumContainer { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>

    <script>
        // 1. YOUR MISSION: Replace this token!
        const CESIUM_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJmM2JjMDdjNC1hY2U4LTQ4ZDgtODc1NS1kMzJjMzlhMWM4YzkiLCJpZCI6NDA0NDc5LCJpYXQiOjE3NzM2NTk3MTl9.euqRPcgTJmTRlW0TT3y2nO2zMwjO1LceVVbxNWZWMyU';
        Cesium.Ion.defaultAccessToken = CESIUM_TOKEN;

        // 2. Initialize the Viewer
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrain: Cesium.Terrain.fromWorldTerrain(),
            baseLayerPicker: false,
            animation: false,
            timeline: false,
            requestRenderMode: true // Saves battery/CPU
        });

        async function loadZenWorld() {
            try {
                // 3. Load Google Photorealistic 3D Tiles
                // Ensure you have added "Google Photorealistic 3D Tiles" 
                // to "My Assets" in your Cesium Ion dashboard.
                const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(2275207);
                viewer.scene.primitives.add(tileset);

                // 4. Apply the Cartoon "Zen" Shader
                tileset.customShader = new Cesium.CustomShader({
                    lightingModel: Cesium.LightingModel.PBR,
                    fragmentShaderText: `
                        void fragmentMain(FragmentInput fsInput, inout czm_modelMaterial material) {
                            vec3 raw = material.diffuse;
                            // Posterization (Color stepping)
                            material.diffuse = floor(raw * 4.0) / 4.0;
                            // Add a soft Zen glow to bright areas
                            material.diffuse += vec3(0.05, 0.05, 0.1);
                        }
                    `
                });

                // 5. Fly to a specific "Zen" spot (San Francisco Waterfront)
                viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromDegrees(-122.389, 37.792, 500),
                    orientation: {
                        heading: Cesium.Math.toRadians(0),
                        pitch: Cesium.Math.toRadians(-25),
                        roll: 0
                    }
                });

            } catch (error) {
                console.error("Error loading tileset:", error);
                alert("Check Console (F12) - The map failed to load.");
            }
        }

        loadZenWorld();

        // Environment Tweaks
        viewer.scene.skyAtmosphere.show = true;
        viewer.scene.fog.enabled = true;
    </script>
</body>
</html>
