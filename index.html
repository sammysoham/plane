<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zen Flight Sim</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.108/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #87CEEB; }
        #cesiumContainer { width: 100%; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; font-family: sans-serif; pointer-events: none; text-shadow: 1px 1px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="ui">
        <h1>Zen Flight</h1>
        <p>WASD to Tilt | SHIFT to Boost</p>
    </div>

    <script>
    const CESIUM_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI5ZDM2ZTMxYi0yNTkyLTQxZjYtOWE4Yi1mYzczOTVkZDI2YjIiLCJpZCI6NDA0NDc5LCJpYXQiOjE3NzM2NTk1MzV9.cHJIwupiDA4ptrQdFQ2I166t8c1Y2BObpatmGbK4UP4';
    Cesium.Ion.defaultAccessToken = CESIUM_TOKEN;

    // Initialize viewer with the NEW terrain method
    const viewer = new Cesium.Viewer('cesiumContainer', {
        terrain: Cesium.Terrain.fromWorldTerrain(), // Updated for newer Cesium versions
        baseLayerPicker: false,
        animation: false,
        timeline: false,
        geocoder: false,
        selectionIndicator: false,
        infoBox: false
    });

    // --- SETUP SCENERY ---
    async function setupTileset() {
        try {
            const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(2275207);
            viewer.scene.primitives.add(tileset);
            
            // Apply Cartoon/Zen Shader
            tileset.customShader = new Cesium.CustomShader({
                lightingModel: Cesium.LightingModel.PBR,
                fragmentShaderText: `
                    void fragmentMain(FragmentInput fsInput, inout czm_modelMaterial material) {
                        vec3 color = material.diffuse;
                        float lum = dot(color, vec3(0.299, 0.587, 0.114));
                        material.diffuse = floor(color * 4.0 + 0.5) / 4.0; // Posterize
                        if(lum < 0.2) material.diffuse *= vec3(0.9, 0.9, 1.3); // Blue shadows
                    }
                `
            });

            // Start over San Francisco for a good view
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(-122.4194, 37.7749, 1000)
            });
        } catch (e) { console.error(e); }
    }
    setupTileset();

    // --- ZEN FLIGHT MODEL ---
    let planeData = {
        pos: Cesium.Cartesian3.fromDegrees(-122.4194, 37.7749, 1000),
        hpr: new Cesium.HeadingPitchRoll(0, 0, 0), // Orientation
        speed: 0.05
    };

    const keys = {};
    window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
    window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

    viewer.scene.preUpdate.addEventListener(function(scene, time) {
        // Flight Sensitivity
        const turnSpeed = 0.03;
        const pitchSpeed = 0.02;

        if (keys['w']) planeData.hpr.pitch -= pitchSpeed;
        if (keys['s']) planeData.hpr.pitch += pitchSpeed;
        if (keys['a']) planeData.hpr.roll -= turnSpeed;
        if (keys['d']) planeData.hpr.roll += turnSpeed;
        if (keys['shift']) planeData.speed = 0.15; else planeData.speed = 0.08;

        // Zen Auto-Leveling (Gently returns to flat flight)
        planeData.hpr.roll *= 0.92;
        planeData.hpr.pitch *= 0.96;

        // Apply Roll to Heading (Banking makes you turn)
        planeData.hpr.heading += planeData.hpr.roll * 0.5;

        // Calculate Movement Vector
        const direction = new Cesium.Cartesian3();
        const matrix = Cesium.Transforms.headingPitchRollToFixedFrame(planeData.pos, planeData.hpr);
        Cesium.Matrix4.getTranslation(matrix, direction);
        
        // Move camera like you are the plane
        viewer.camera.setView({
            destination: planeData.pos,
            orientation: planeData.hpr
        });
        
        // Move forward (Zen drift)
        const forward = viewer.camera.direction;
        Cesium.Cartesian3.multiplyByScalar(forward, planeData.speed, forward);
        Cesium.Cartesian3.add(planeData.pos, forward, planeData.pos);
    });

    // Atmosphere Polish
    viewer.scene.skyAtmosphere.hueShift = -0.1;
    viewer.scene.fog.enabled = true;
</script>
</body>
</html>
